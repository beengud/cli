query ListMetrics(
  $match: String!
  $inDatasets: [ObjectId!]
  $heuristicsOptions: MetricHeuristicsOptions
) {
  metricSearch(
    match: $match
    inDatasets: $inDatasets
    heuristicsOptions: $heuristicsOptions
  ) {
    matches {
      datasetId
      metric {
        name
        nameWithPath
        description
        type
        unit
        state
        aggregate
        rollup
        interval
        userDefined
      }
    }
    datasets {
      id
      name
    }
    numSearched
  }
}
