mutation UpdateKubernetesContent(
  $input: KubernetesContentInput!
  $rematerializationAction: RematerializationAction
) {
  updateKubernetesContent(
    input: $input
    rematerializationAction: $rematerializationAction
  ) {
    otelLogsDatasetId
    prometheusDatasetId
    entityDatasetId
    kubernetesLogsDatasetId
  }
}
